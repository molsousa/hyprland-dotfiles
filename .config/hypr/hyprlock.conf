general {
    background_blur = true
    background = blur
    no_fade_in = false
    disable_loading_bar = false
    grace = 0 
    hide_cursor = true
    ignore_empty_password = true
    immediate_rendering = true
}

# Background

background {
    monitor = 
    path = /home/molsousa/.config/hypr/wallpapers/the_neon_shallows_by_leikoi_ddm6tx0.png 
    blur = true # Blur in wallpaper of hyprlock
    blur_size = 2
    blur_passes = 2
    noise = 0.025
    contrast = 1.3000
    brightness = 0.8000
    vibrancy = 0.2100
    vibrancy_darkness = 0.0
}

# Password input

input-field {
    monitor =
    background = rgba(30, 30, 30, 1)
    color = rgba(180, 190, 254, 1)
    size = 250, 40
    outer_color = rgba(55,5,50,1)
    outline_thickness = 1
    rounding = 50
    dots_spacing = true
    dots_center = true
    dots_rounding = -1
    dots_size = 0.3
    inner_color = rgba(57, 37, 77, 0.85)
    font_color = rgba(225, 225, 225, 1)
    fade_on_empty = true
    placeholder_text = <i>Digite sua senha</i> # Text rendered in th>
    hide_input = false
    position = 0, -180
    halign = center
    valign = center
}
 
on-screen-lock {
    exec = playerctl pause
}
on-screen-lock {
    exec = playerctl play
}

# Date
label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +"%H:%M") </big></b>"
    color = $color6
    font_size = 100
    font_family = JetBrainsMono Nerd Font
    position = 0, 240
    halign = center
    valign = center
    fade_on_empty = false
}

# User
label {
    monitor =
    text =   Olá, $USER!
    color = rgba(152,115,172,1) # $color3
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    shadow_passes = 1
    shadow_size = 2
    shadow_color = rgba(0, 0, 0, 0.8)
    position = 0, -50
    halign = center
    valign = center
}
label {
    monitor 
    text = cmd[update:18000000] echo "<b> "$(date +'%A, %-d %B %Y')" </b>"
    color = $color4
    font_size = 25
    font_family = JetBrainsMono Nerd Font
    position = 0, 150
    valign = center
    halign = center
    fade_on_empty = 1000
    fade_on_empty = false
}

# CURRENT SONG
label {
    monitor =
    text = cmd[update:1000] echo "$(~/.config/scripts/songdetail.sh)" 
    color = rgba(255, 255, 255, 0.7)
    font_size = 10
    font_family = JetBrains Mono Nerd, Iosevka
    position = 0, 60
    halign = center
    valign = bottom
}

